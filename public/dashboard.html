<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Mirror Remote Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.3/css/bulma.min.css">
    <link rel="stylesheet" href="./app.css">
    <style>
        .sr-hue-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 12px;
        }
        .sr-hue-card {
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            cursor: pointer;
        }
        .sr-hue-card.is-pending { opacity: 0.7; }
        .sr-hue-title {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .sr-hue-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            opacity: 0.85;
        }
        .sr-hue-dot {
            width: 14px;
            height: 14px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.35);
            display: inline-block;
        }
        .sr-hue-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .sr-hue-controls-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sr-hue-controls input[type="color"] {
            width: 40px;
            height: 30px;
            padding: 0;
            border: none;
            background: transparent;
        }
        .sr-hue-controls input[type="range"] {
            width: 110px;
        }
    </style>
</head>
<body class="sr-bg">
<section class="section">
    <div class="container">
        <nav class="level mb-5">
            <div class="level-left">
                <div class="level-item">
                    <h1 class="title is-4">Mirror Remote</h1>
                </div>
            </div>
            <div class="level-right">
                <div class="level-item">
                    <a class="button is-light" href="./config">Config editor</a>
                </div>
                <div class="level-item">
                    <button id="logout" class="button is-light">Logout</button>
                </div>
            </div>
        </nav>

        <div class="columns">
            <div class="column is-5">
                <div class="box sr-box">
                    <h2 class="title is-5">Send alert</h2>

                    <div class="field">
                        <label class="label">Title</label>
                        <div class="control">
                            <input id="title" class="input" type="text" placeholder="Medication reminder">
                        </div>
                    </div>

                    <div class="field">
                        <label class="label">Message</label>
                        <div class="control">
                            <textarea id="message" class="textarea" rows="6" placeholder="Type the alert text..."></textarea>
                        </div>
                    </div>

                    <button id="send" class="button is-link is-fullwidth">Send to mirror</button>

                    <p id="sent" class="has-text-success mt-3" style="display:none;">Sent.</p>
                    <p id="sendErr" class="has-text-danger mt-3" style="display:none;">Failed.</p>
                </div>
            </div>

            <div class="column">
                <div class="box sr-box">
                    <div class="level">
                        <div class="level-left">
                            <h2 class="title is-5 level-item">Queue</h2>
                        </div>
                        <div class="level-right">
                            <button id="clear" class="button is-danger is-light level-item">Clear all</button>
                        </div>
                    </div>

                    <div id="queue"></div>
                </div>
            </div>
        </div>

        <div class="box sr-box mt-5">
            <div class="level">
                <div class="level-left">
                    <h2 class="title is-5 level-item">Hue</h2>
                    <span id="hueStatus" class="tag is-light level-item">Loading…</span>
                </div>
                <div class="level-right">
                    <div class="buttons">
                        <button id="hueTypeLights" class="button is-small is-light">Lights</button>
                        <button id="hueTypeGroups" class="button is-small is-light">Rooms</button>
                        <button id="hueMic" class="button is-small is-light">🎤</button>
                    </div>
                </div>
            </div>

            <p class="mb-3">
                Tap a card to toggle. Voice examples: “lights on”, “lights off”, “set lights red”.
            </p>

            <div id="hueErr" class="notification is-danger is-light" style="display:none;"></div>
            <div id="hueList" class="sr-hue-grid"></div>
        </div>
    </div>
</section>

<script src="./app.js"></script>
<script src="./dashboard.js"></script>
</body>
</html>
